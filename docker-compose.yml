services:
  postgres:
    image: postgres:15-alpine
    container_name: maprang-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: maprang_local
    ports:
      - "5432:5432"
    volumes:
      - maprang_pg_data:/var/lib/postgresql/data

volumes:
  maprang_pg_data:
