name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun run secrets:check
      - run: bun run secrets:patterns:test
      - run: bun run memory:audit
      - run: bun run knowledge:audit
      - run: bun run vault:audit:test
      - run: bun run eval:local

  predeploy:
    runs-on: ubuntu-latest
    needs: secrets
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun run predeploy:check
      - run: bun run secrets:patterns:test
      - run: bun run vault:audit:test
      - run: bun run security:audit
      - run: bun run security:audit:test
      - run: bun run api:audit
      - run: bun run api:audit:test
      - run: bun run frontend:bundle:test
      - run: bun run frontend:static:audit:test
      - run: bun run frontend:route:audit:test
      - run: bun run route-menu:audit
      - run: bun run route-menu:audit:test
      - run: bun run smoke:helpers:test
      - run: bun run provider:smoke:guards:test
      - run: bun run smoke:ready:test
      - run: bun run backend:check:db:test
      - run: bun run supabase:storage:test
      - run: bun run release:handoff:check
      - run: bun run release:handoff:test
      - run: bun run deploy:readiness:test
      - run: bun run deploy:status:test
      - run: bun run deploy:doctor:self-test

  backend:
    runs-on: ubuntu-latest
    needs: predeploy
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: maprang_local
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d maprang_local"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/backend
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://admin:password123@localhost:5432/maprang_local
      OPENROUTER_API_KEY: ci-placeholder-key
      CORS_ORIGINS: http://localhost:5173
      STORAGE_PROVIDER: local
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bunx prisma migrate deploy
      - run: bun run deploy:check

  frontend:
    runs-on: ubuntu-latest
    needs: predeploy
    defaults:
      run:
        working-directory: apps/frontend
    env:
      VITE_API_BASE_URL: http://localhost:3000
      VITE_SUPABASE_URL: https://ci.supabase.co
      VITE_SUPABASE_ANON_KEY: ci-anon-public-key
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run deploy:check

  smoke-local:
    runs-on: ubuntu-latest
    needs: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: maprang_local
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d maprang_local"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://admin:password123@localhost:5432/maprang_local
      OPENROUTER_API_KEY: ci-placeholder-key
      CORS_ORIGINS: http://localhost:5173
      STORAGE_PROVIDER: local
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd apps/backend && bun install --frozen-lockfile
      - run: cd apps/backend && bunx prisma generate
      - run: cd apps/backend && bunx prisma migrate deploy
      - run: cd apps/backend && bun prisma/seed.ts
      - name: Run seeded local smoke tests
        run: |
          cd apps/backend
          bun run start &
          backend_pid=$!
          trap 'kill $backend_pid 2>/dev/null || true' EXIT
          cd ../..
          sleep 5
          bun run smoke:doctor
          bun run smoke:local

  docker-build:
    runs-on: ubuntu-latest
    needs: predeploy
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f apps/backend/Dockerfile -t maprang-backend:ci .
      - run: >
          docker build -f apps/frontend/Dockerfile -t maprang-frontend:ci
          --build-arg VITE_API_BASE_URL=http://localhost:3000
          --build-arg VITE_SUPABASE_URL=https://ci.supabase.co
          --build-arg VITE_SUPABASE_ANON_PUBLIC=ci-anon-public-key
          .
