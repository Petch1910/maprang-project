name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun run secrets:check

  backend:
    runs-on: ubuntu-latest
    needs: secrets
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: maprang_local
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d maprang_local"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/backend
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://admin:password123@localhost:5432/maprang_local
      OPENROUTER_API_KEY: ci-placeholder-key
      CORS_ORIGINS: http://localhost:5173
      STORAGE_PROVIDER: local
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bunx prisma migrate deploy
      - run: bun run deploy:check

  frontend:
    runs-on: ubuntu-latest
    needs: secrets
    defaults:
      run:
        working-directory: apps/frontend
    env:
      VITE_API_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run deploy:check

  docker-build:
    runs-on: ubuntu-latest
    needs: secrets
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f apps/backend/Dockerfile -t maprang-backend:ci .
      - run: docker build -f apps/frontend/Dockerfile -t maprang-frontend:ci --build-arg VITE_API_BASE_URL=http://localhost:3000 .
