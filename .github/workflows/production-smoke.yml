name: Production Smoke

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: Backend URL ที่ต้องการทดสอบ ถ้าเว้นว่างจะใช้ repository secret SMOKE_API_BASE_URL
        required: false
        type: string
      run_chat:
        description: รันทดสอบแชทจริงกับ AI คำสั่งนี้ใช้เครดิตผู้ให้บริการจริง
        required: true
        default: false
        type: boolean
      run_image:
        description: รันทดสอบสร้างรูปจริง คำสั่งนี้ใช้เครดิตสร้างรูปจริง
        required: true
        default: false
        type: boolean
      min_token_balance_for_chat:
        description: ยอดโทเคนขั้นต่ำของผู้ใช้ smoke ก่อนรันทดสอบแชทจริงที่ใช้เครดิตผู้ให้บริการจริง
        required: true
        default: '1000'
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      SMOKE_API_BASE_URL: ${{ inputs.api_base_url || secrets.SMOKE_API_BASE_URL }}
      SMOKE_ACCESS_TOKEN: ${{ secrets.SMOKE_ACCESS_TOKEN }}
      SMOKE_USER_ID: ${{ secrets.SMOKE_USER_ID }}
      SMOKE_ADMIN_API_KEY: ${{ secrets.SMOKE_ADMIN_API_KEY }}
      SMOKE_MIN_TOKEN_BALANCE_FOR_CHAT: ${{ inputs.min_token_balance_for_chat }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
      SUPABASE_STORAGE_ACCESS: ${{ secrets.SUPABASE_STORAGE_ACCESS }}
      SUPABASE_SIGNED_URL_EXPIRES_IN: ${{ secrets.SUPABASE_SIGNED_URL_EXPIRES_IN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run predeploy:check
      - run: bun run predeploy:check:test
      - run: bun run secrets:check
      - run: bun run secrets:check:test
      - run: bun run secrets:patterns:test
      - run: bun run memory:audit
      - run: bun run knowledge:audit
      - run: bun run vault:audit:test
      - run: bun run docs:commands
      - run: bun run docs:commands:test
      - run: bun run eval:local
      - run: bun run eval:local:test
      - run: bun run security:audit
      - run: bun run security:audit:test
      - run: bun run import-cycle:audit
      - run: bun run import-cycle:audit:test
      - run: bun run api:audit
      - run: bun run api:audit:test
      - run: bun run api:smoke:test
      - run: bun run frontend:api:test
      - run: bun run frontend:env:test
      - run: bun run frontend:storage:test
      - run: bun run frontend:clipboard:test
      - run: bun run frontend:bundle:test
      - run: bun run frontend:static:audit
      - run: bun run frontend:static:audit:test
      - run: bun run frontend:route:audit
      - run: bun run frontend:route:audit:test
      - run: bun run route-menu:audit
      - run: bun run route-menu:audit:test
      - run: bun run smoke:helpers:test
      - run: bun run provider:smoke:guards:test
      - run: bun run smoke:doctor:test
      - run: bun run smoke:ready:test
      - run: bun run smoke:image:test
      - run: bun run smoke:chat:test
      - run: bun run smoke:local:test
      - run: bun run e2e:smoke:test
      - run: bun run backend:check:db:test
      - run: bun run supabase:storage:test
      - run: bun run release:handoff:check
      - run: bun run release:handoff:test
      - run: bun run deploy:readiness:test
      - run: bun run deploy:status:test
      - run: bun run deploy:doctor:test
      - run: bun run deploy:doctor:self-test
      - name: ตรวจ config ก่อนรัน smoke
        run: |
          if [ -z "$SMOKE_API_BASE_URL" ]; then
            echo "ตั้ง workflow input api_base_url หรือ repository secret SMOKE_API_BASE_URL ก่อนรัน smoke"
            exit 1
          fi
          bun --eval 'import { deployedSmokeTargetIssues } from "./scripts/smoke-helpers"; const issues = deployedSmokeTargetIssues(process.env.SMOKE_API_BASE_URL ?? ""); if (issues.length > 0) { console.error(`SMOKE_API_BASE_URL ต้องเป็น backend URL ที่ deploy แล้วแบบ https ไม่มี credential/userinfo, path/query/hash, หรือ localhost/loopback: ${issues.join("; ")}`); process.exit(1); }'
          if [ -z "$SMOKE_ACCESS_TOKEN" ] && [ -z "$SMOKE_USER_ID" ]; then
            echo "ตั้ง repository secret SMOKE_ACCESS_TOKEN หรือ SMOKE_USER_ID สำหรับ smoke ฝั่งผู้ใช้"
            exit 1
          fi
          if [ -z "$SMOKE_ADMIN_API_KEY" ]; then
            echo "ตั้ง repository secret SMOKE_ADMIN_API_KEY เพื่อให้ production smoke ตรวจรายงานและ audit log ฝั่งผู้ดูแล"
            exit 1
          fi
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "ตั้ง repository secrets SUPABASE_URL และ SUPABASE_SERVICE_ROLE_KEY เพื่อให้ production smoke ตรวจ bucket รูปตัวละครแบบ private"
            exit 1
          fi
          if [ -z "$SUPABASE_STORAGE_BUCKET" ]; then
            echo "ตั้ง repository secret SUPABASE_STORAGE_BUCKET โดยปกติใช้ avatars"
            exit 1
          fi
          if [ "$SUPABASE_STORAGE_ACCESS" != "signed" ]; then
            echo "ตั้ง repository secret SUPABASE_STORAGE_ACCESS=signed สำหรับตรวจรูปตัวละครใน production smoke"
            exit 1
          fi
          if [ -z "$SUPABASE_SIGNED_URL_EXPIRES_IN" ]; then
            echo "ตั้ง repository secret SUPABASE_SIGNED_URL_EXPIRES_IN โดยปกติใช้ 3600"
            exit 1
          fi
      - name: พิมพ์สถานะ deploy readiness
        run: bun run deploy:status
      - run: bun scripts/smoke-doctor.ts --strict-production
      - name: ตรวจ Supabase signed URL สำหรับรูปตัวละคร
        run: bun run supabase:storage:check
      - run: bun run smoke:ready
      - run: bun run smoke:local
      - run: bun run smoke:image
      - name: ตรวจ admin APIs
        run: bun scripts/api-smoke.ts --require-admin
      - if: ${{ inputs.run_chat && inputs.run_image }}
        run: bun scripts/api-smoke.ts --live --require-live-image --require-admin
      - if: ${{ inputs.run_image && !inputs.run_chat }}
        run: bun run smoke:image:live
      - if: ${{ inputs.run_chat && !inputs.run_image }}
        run: bun run smoke:chat
